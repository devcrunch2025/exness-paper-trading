<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Watchlist Charts</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Mono:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="bg-shape shape-a"></div>
    <div class="bg-shape shape-b"></div>

    <nav class="watchlist-nav-bar" aria-label="Watchlist controls">
      <span class="watchlist-nav-title">Watchlist Charts</span>
      <button id="editWatchlistBtn" type="button" class="wl-btn-edit">&#43; Edit Watchlist</button>
    </nav>

    <main class="dashboard chart-page chart-only-page">
      <section class="chart-grid focus-layout" id="chartGrid" aria-label="Watchlist charts">
        <article class="panel empty-panel">Loading charts...</article>
      </section>
    </main>

    <div id="chartPopup" class="chart-popup" aria-hidden="true">
      <div id="chartPopupBackdrop" class="chart-popup-backdrop"></div>
      <section class="chart-popup-panel" role="dialog" aria-modal="true" aria-labelledby="chartPopupTitle">
        <header class="chart-popup-header">
          <div>
            <h2 id="chartPopupTitle">Live Chart</h2>
            <p id="chartPopupMeta" class="chart-popup-meta">TradingView live chart</p>
          </div>
          <div class="chart-popup-actions">
            <span id="chartPopupStatus" class="chart-popup-status">Loading...</span>
            <button id="chartPopupClose" type="button" class="tv-maximize-btn close-btn">Close</button>
          </div>
        </header>

        <div id="popupTradingViewHost" class="popup-tv-host"></div>
        <div id="popupLocalHost" class="popup-local-host"></div>
      </section>
    </div>

    <div id="watchlistEditorOverlay" class="wl-overlay" hidden>
      <aside class="wl-dialog" role="dialog" aria-modal="true" aria-labelledby="wlDialogTitle">
        <header class="wl-dialog-head">
          <h2 id="wlDialogTitle">Edit Watchlist</h2>
          <button id="closeWatchlistBtn" type="button" class="wl-btn-close" aria-label="Close editor">&#x2715;</button>
        </header>
        <div class="wl-section">
          <h3>Current symbols</h3>
          <div id="wlChips" class="wl-chips"></div>
        </div>
        <div class="wl-section">
          <h3>Add markets</h3>
          <input id="wlSearch" type="search" placeholder="Search e.g. SOLUSDT, BTC&hellip;" autocomplete="off" spellcheck="false" />
          <div id="wlResults" class="wl-results"></div>
        </div>
      </aside>
    </div>

    <script src="charts.js"></script>
  </body>
</html>
