<!DOCTYPE html>
<html>
<head>
    <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
</head>
<body>

<div id="chart" style="width: 900px; height: 400px;"></div>

<script>
// Create chart
const chart = LightweightCharts.createChart(document.getElementById('chart'), {
    width: 900,
    height: 400,
});

// ✅ NEW WAY (v5+)
const candleSeries = chart.addSeries(LightweightCharts.CandlestickSeries);

// Data
const data = [
    { time: '2024-01-01', open: 100, high: 110, low: 95, close: 105 },
    { time: '2024-01-02', open: 105, high: 115, low: 100, close: 110 },
    { time: '2024-01-03', open: 110, high: 120, low: 108, close: 112 },
    { time: '2024-01-04', open: 112, high: 118, low: 105, close: 107 },
];

// Set data
candleSeries.setData(data);

// Markers
candleSeries.setMarkers([
    {
        time: '2024-01-02',
        position: 'belowBar',
        color: 'green',
        shape: 'arrowUp',
        text: 'BUY',
    },
    {
        time: '2024-01-04',
        position: 'aboveBar',
        color: 'red',
        shape: 'arrowDown',
        text: 'SELL',
    }
]);
</script>

</body>
</html>
